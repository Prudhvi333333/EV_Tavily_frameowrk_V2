runtime:
  strict_mode: true
  ollama_keep_alive: 0s
  ollama_options:
    num_ctx: 4096

project:
  name: rag_eval_project_v2
  random_seed: 42

paths:
  kb_input: data/kb/kb_master.xlsx
  questions_input: data/questions/questions_master.xlsx
  train_questions: data/questions/train_questions.xlsx
  test_questions: data/questions/test_questions.xlsx
  extra_test_questions: ""
  web_cache_dir: data/web_cache
  chroma_dir: outputs/chroma_db
  reports_dir: outputs/reports
  progress_dir: outputs/progress
  logs_dir: outputs/logs

pipelines:
  - rag
  - no_rag
  - rag_pretrained
  - rag_pretrained_web

models:
  qwen: qwen2.5:14b
  kimi: kimi-k2.5:cloud
  gemma: gemma3:12b
  gemini: gemini-2.5-flash-preview-05-20

run:
  default_models:
    - qwen

split:
  train: 35
  test: 15
  strategy: stratified
  stratify_column: Use Case Category

embeddings:
  provider: ollama
  model: nomic-embed-text
  ollama_base_url: http://localhost:11434
  local_files_only: true
  timeout: 420
  keep_alive: 0s
  batch_size: 8
  max_retries: 4
  retry_backoff_sec: 5.0
  recommended_models:
    quality: nomic-embed-text
    balanced: sentence-transformers/all-mpnet-base-v2
    fast: sentence-transformers/all-MiniLM-L6-v2
  cross_encoder_model: cross-encoder/ms-marco-MiniLM-L6-v2
  instruction_prefixes:
    enabled: true
    only_for_nomic: true
    query: "search_query:"
    document: "search_document:"

retrieval:
  backend: llamaindex
  top_k: 8
  adaptive_top_k: true
  max_context_chars: 4200
  max_doc_chars: 700
  semantic_weight: 0.7
  bm25_weight: 0.3
  metadata_scoring:
    location_match_boost: 0.08
    location_mismatch_penalty: -0.02
    tier_match_boost: 0.14
    tier_mismatch_penalty: -0.10
    role_match_boost: 0.10
    oem_match_boost: 0.05
    max_boost: 0.30
    max_penalty: -0.22
  chunk_strategy: row_only
  prompt_variant: chain_of_thought

reranker:
  enabled: true
  provider: cross_encoder
  model: cross-encoder/ms-marco-MiniLM-L6-v2
  local_files_only: true
  max_candidates: 18
  blend_weight: 0.65

hyde:
  enabled: false
  model: qwen2.5:14b
  apply_to_intents:
    - indirect
    - multi_hop
    - comparison

crawler:
  timeout_per_url: 30
  total_timeout: 240
  tavily_timeout: 75
  tavily_max_retries: 3
  tavily_retry_backoff_sec: 2.0
  firecrawl_max_retries: 2
  firecrawl_retry_backoff_sec: 1.5
  fail_on_search_error: false
  max_urls: 5
  top_results: 3
  max_web_context_chars: 3200
  cache_enabled: true
  search_provider: tavily
  crawl_provider: firecrawl
  tavily_api_key_env: TAVILY_API_KEY
  firecrawl_api_key_env: FIRECRAWL_API_KEY
  tavily_answer_fallback:
    enabled: true
    max_retries: 2
    retry_backoff_sec: 1.5
    search_depth: advanced
    max_results: 5
  metadata_filtering:
    enabled: true
    registry_path: rag_data_management_registry.xlsx
    validate_registry_schema: true
    min_tavily_metadata_score: 0.14
    min_query_overlap: 0.04
    max_results_per_domain: 2
    allowed_domains: []
    blocked_domains: []

web_validator:
  rerank_enabled: true
  threshold: 0.50
  low_confidence_floor: 0.42
  llm_min_score: 0.05
  cross_encoder_local_files_only: true
  partial_relevance_floor: 0.15
  partial_semantic_override_min: 0.60
  partial_keyword_override_min: 0.30
  judge:
    provider: ollama
    model: kimi-k2.5:cloud
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
  signal_weights:
    - 0.40
    - 0.35
    - 0.25
  domain_keywords:
    tier1:
      - electric vehicle
      - ev battery
      - lithium-ion
      - battery cell
      - battery pack
      - supply chain
      - automotive supplier
      - tier 1
      - tier 2
      - oem
      - original equipment manufacturer
      - georgia manufacturer
      - georgia automotive
      - thermal management
      - ev supply
      - battery electrolyte
    tier2:
      - automotive
      - manufacturing
      - vehicle
      - battery
      - supplier
      - hyundai
      - kia
      - rivian
      - ford
      - gm
      - georgia
      - plant
      - facility
      - production
      - assembly

evaluation:
  allow_heuristic_fallback: false
  judge:
    provider: ollama
    model: kimi-k2.5:cloud
    ollama_base_url: http://localhost:11434
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
  validator:
    provider: ollama
    model: kimi-k2.5:cloud
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    flag_threshold: 0.3
  weights_rag:
    faithfulness: 0.25
    answer_relevancy: 0.20
    context_precision: 0.20
    context_recall: 0.20
    answer_correctness: 0.15
  weights_norag:
    answer_relevancy: 0.50
    answer_correctness: 0.50
  weights_rag_pretrained:
    faithfulness: 0.22
    answer_relevancy: 0.20
    context_precision: 0.18
    context_recall: 0.18
    answer_correctness: 0.12
    source_attribution: 0.10
  weights_rag_pretrained_web:
    faithfulness: 0.20
    answer_relevancy: 0.18
    context_precision: 0.16
    context_recall: 0.16
    answer_correctness: 0.12
    source_attribution: 0.10
    web_grounding: 0.08

prompting:
  mode: chain_of_thought
  few_shot_examples: 2
